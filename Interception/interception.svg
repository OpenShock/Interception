<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Two incoming paths converging to center -->
  <line x1="6" y1="16" x2="32" y2="32" stroke="#53a8b6" stroke-width="4" stroke-linecap="round"/>
  <line x1="6" y1="48" x2="32" y2="32" stroke="#53a8b6" stroke-width="4" stroke-linecap="round"/>
  <!-- Single outgoing path -->
  <line x1="32" y1="32" x2="58" y2="32" stroke="#e94560" stroke-width="4" stroke-linecap="round"/>
  <!-- Central intercept node -->
  <circle cx="32" cy="32" r="9" fill="#e94560"/>
  <circle cx="32" cy="32" r="4" fill="#fff"/>
</svg>
